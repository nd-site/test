<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thùng thư góp ý</title>
    <style>
        /* Thiết lập chung */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Thanh điều hướng/Tiêu đề */
        header {
            background-color: #4285f4;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Khung chứa Form */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-wrapper {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Tối ưu hóa Iframe */
        iframe {
            width: 100%;
            height: 900px; /* Bạn có thể điều chỉnh độ cao này */
            border: none;
        }

        /* Chân trang */
        footer {
            background: #333;
            color: #ccc;
            text-align: center;
            padding: 15px 0;
            font-size: 0.9em;
        }

        /* Responsive cho điện thoại */
        @media (max-width: 600px) {
            header h1 { font-size: 1.2rem; }
            iframe { height: 700px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>HỆ THỐNG TIẾP NHẬN BIỂU MẪU Trực Tuyến</h1>
    </header>

    <div class="container">
        <div class="form-wrapper">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSeiLoQ2UTWUtXRGgt6AL9parWykX3nnALtbIP7-3zGivrgQIQ/viewform?embedded=true" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                Đang tải biểu mẫu...
            </iframe>
        </div>
    </div>

    <footer>
        &copy; 2024 Bản quyền thuộc về Đơn vị của bạn
    </footer>

</body>
</html>
