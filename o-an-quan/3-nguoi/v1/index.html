<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ô Ăn Quan 3 Players - ND Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
            touch-action: manipulation;
        }

        .board-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Container này sẽ co giãn dựa trên slider */
        .board-scaler {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease-out;
        }

        .board {
            position: relative;
            width: 600px;
            height: 600px;
        }

        .pit {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            user-select: none;
            z-index: 10;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px currentColor; }
            50% { box-shadow: 0 0 20px 5px currentColor; }
            100% { box-shadow: 0 0 0 0px currentColor; }
        }

        .pit.playable {
            cursor: pointer !important;
            animation: pulse-border 1.5s infinite;
            border-color: #ffffff !important;
            transform: scale(1.05);
            z-index: 50;
        }

        .pit.quan {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: linear-gradient(135deg, #1e293b 0%, #020617 100%);
            border: 3px solid #fbbf24;
            font-size: 1.8rem;
            color: #fbbf24;
            cursor: default !important;
        }

        .player-card {
            position: absolute;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid transparent;
            min-width: 140px;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .player-card.active {
            transform: scale(1.1);
            background: rgba(30, 41, 59, 1);
            border-color: inherit;
            box-shadow: 0 0 30px currentColor;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 2rem;
            border-radius: 1.5rem;
            z-index: 1000;
            display: none;
            text-align: center;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        .dir-btn {
            background: #3b82f6;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            margin: 0.5rem;
            font-weight: 800;
            color: white;
            transition: 0.2s;
        }

        .dir-btn:hover { background: #2563eb; transform: translateY(-2px); }

        .p0-color { color: #10b981; border-color: #10b981; }
        .p1-color { color: #0ea5e9; border-color: #0ea5e9; }
        .p2-color { color: #818cf8; border-color: #818cf8; }

        .bg-p0 { background: rgba(16, 185, 129, 0.15); }
        .bg-p1 { background: rgba(14, 165, 233, 0.15); }
        .bg-p2 { background: rgba(129, 140, 248, 0.15); }

        /* Zoom Control */
        .zoom-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.8);
            padding: 10px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="board-container">
        <!-- Zoom Slider -->
        <div class="zoom-control">
            <span class="text-xs font-bold opacity-60">THU PHÓNG</span>
            <input type="range" id="zoom-slider" min="0.3" max="1.2" step="0.05" value="0.8" class="w-32 accent-blue-500">
        </div>

        <!-- Scores -->
        <div id="card-0" class="player-card p0-color" style="top: 20px; left: 20px;">
            <div class="text-xs uppercase font-bold opacity-60">P1 (Xanh lá)</div>
            <div id="score-0" class="text-3xl font-black">0</div>
        </div>
        <div id="card-1" class="player-card p1-color" style="top: 20px; right: 20px;">
            <div class="text-xs uppercase font-bold opacity-60">P2 (Xanh dương)</div>
            <div id="score-1" class="text-3xl font-black">0</div>
        </div>
        <div id="card-2" class="player-card p2-color" style="bottom: 20px; left: 50%; transform: translateX(-50%);">
            <div class="text-xs uppercase font-bold opacity-60">P3 (Tím)</div>
            <div id="score-2" class="text-3xl font-black">0</div>
        </div>

        <!-- Board Scaler -->
        <div id="board-scaler" class="board-scaler" style="transform: scale(0.8);">
            <div id="board" class="board"></div>
        </div>

        <div id="turn-indicator" class="fixed top-1/2 left-5 -translate-y-1/2 -rotate-90 text-xl font-black opacity-30 pointer-events-none">
            LƯỢT: NGƯỜI CHƠI 1
        </div>
    </div>

    <!-- Direction Picker -->
    <div id="modal" class="modal">
        <h3 class="text-white text-lg font-bold mb-4">Chọn hướng rải quân</h3>
        <div class="flex">
            <button class="dir-btn" onclick="startMove(-1)">NGƯỢC CHIỀU</button>
            <button class="dir-btn" onclick="startMove(1)">THUẬN CHIỀU</button>
        </div>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const modalEl = document.getElementById('modal');
        const scalerEl = document.getElementById('board-scaler');
        const zoomSlider = document.getElementById('zoom-slider');
        
        // 18 ô: Q, D, D, D, D, D, Q, D, D, D, D, D, Q, D, D, D, D, D
        let state = [];
        let currentPlayer = 0;
        let scores = [0, 0, 0];
        let isAnimating = false;
        let selectedIdx = -1;

        // Zoom logic
        zoomSlider.addEventListener('input', (e) => {
            scalerEl.style.transform = `scale(${e.target.value})`;
        });

        function init() {
            state = [];
            for (let i = 0; i < 18; i++) {
                if (i % 6 === 0) {
                    state.push({ type: 'quan', count: 10, owner: -1 });
                } else {
                    state.push({ type: 'dan', count: 5, owner: Math.floor(i / 6) });
                }
            }
            // Auto zoom for small screens
            if (window.innerWidth < 768) {
                zoomSlider.value = 0.5;
                scalerEl.style.transform = "scale(0.5)";
            }
            render();
            updateUI();
        }

        function render() {
            boardEl.innerHTML = '';
            const R = 250;
            const CX = 300;
            const CY = 300;

            state.forEach((pit, i) => {
                const angle = (i / 18) * Math.PI * 2 - Math.PI / 2;
                const x = CX + R * Math.cos(angle);
                const y = CY + R * Math.sin(angle);

                const el = document.createElement('div');
                el.id = `pit-${i}`;
                const ownerClass = pit.owner !== -1 ? `p${pit.owner}-color bg-p${pit.owner}` : '';
                el.className = `pit ${pit.type === 'quan' ? 'quan' : ''} ${ownerClass}`;
                
                const offset = pit.type === 'quan' ? 50 : 30;
                el.style.left = `${x - offset}px`;
                el.style.top = `${y - offset}px`;
                el.innerText = pit.count;

                if (pit.type === 'dan' && pit.owner === currentPlayer && pit.count > 0 && !isAnimating) {
                    el.classList.add('playable');
                    el.onclick = () => {
                        selectedIdx = i;
                        modalEl.style.display = 'block';
                    };
                } else {
                    el.onclick = null;
                }

                boardEl.appendChild(el);
            });
        }

        async function startMove(dir) {
            modalEl.style.display = 'none';
            if (isAnimating) return;
            isAnimating = true;

            let hand = state[selectedIdx].count;
            state[selectedIdx].count = 0;
            let curr = selectedIdx;
            
            updateRenderOnly();

            while (true) {
                while (hand > 0) {
                    curr = (curr + dir + 18) % 18;
                    state[curr].count++;
                    hand--;
                    updateRenderOnly();
                    highlight(curr);
                    await new Promise(r => setTimeout(r, 200));
                }

                let nxt = (curr + dir + 18) % 18;
                let anxt = (nxt + dir + 18) % 18;

                if (state[nxt].count > 0 && state[nxt].type === 'dan') {
                    hand = state[nxt].count;
                    state[nxt].count = 0;
                    curr = nxt;
                    updateRenderOnly();
                    await new Promise(r => setTimeout(r, 300));
                } else if (state[nxt].count > 0 && state[nxt].type === 'quan') {
                    break;
                } else if (state[nxt].count === 0) {
                    if (state[anxt].count > 0) {
                        while (state[nxt].count === 0 && state[anxt].count > 0) {
                            scores[currentPlayer] += state[anxt].count;
                            state[anxt].count = 0;
                            updateRenderOnly();
                            
                            const target = document.getElementById(`pit-${anxt}`);
                            target.style.transform = "scale(2)";
                            target.style.background = "white";
                            await new Promise(r => setTimeout(r, 400));
                            target.style.transform = "";
                            target.style.background = "";

                            nxt = (anxt + dir + 18) % 18;
                            anxt = (nxt + dir + 18) % 18;
                            if (state[nxt].count !== 0) break;
                        }
                        break;
                    } else {
                        break;
                    }
                }
            }

            checkEnd();
            isAnimating = false;
            currentPlayer = (currentPlayer + 1) % 3;
            
            let myStones = state.filter(p => p.owner === currentPlayer).reduce((a, b) => a + b.count, 0);
            if (myStones === 0 && !isGameOver()) {
                scores[currentPlayer] -= 5;
                state.forEach(p => { if(p.owner === currentPlayer) p.count = 1; });
            }
            
            updateUI();
            render();
        }

        function updateUI() {
            scores.forEach((s, i) => {
                document.getElementById(`score-${i}`).innerText = s;
                document.getElementById(`card-${i}`).classList.toggle('active', i === currentPlayer);
            });
            document.getElementById('turn-indicator').innerText = `LƯỢT: NGƯỜI CHƠI ${currentPlayer + 1}`;
            document.getElementById('turn-indicator').className = `fixed top-1/2 left-5 -translate-y-1/2 -rotate-90 text-xl font-black opacity-30 p${currentPlayer}-color`;
        }

        function updateRenderOnly() {
            state.forEach((p, i) => {
                const el = document.getElementById(`pit-${i}`);
                if (el) el.innerText = p.count;
            });
            scores.forEach((s, i) => {
                const el = document.getElementById(`score-${i}`);
                if (el) el.innerText = s;
            });
        }

        function highlight(idx) {
            const el = document.getElementById(`pit-${idx}`);
            if (el) {
                el.style.boxShadow = "0 0 30px white";
                setTimeout(() => el.style.boxShadow = "", 150);
            }
        }

        function isGameOver() {
            return state[0].count === 0 && state[6].count === 0 && state[12].count === 0;
        }

        function checkEnd() {
            if (isGameOver()) {
                state.forEach(p => {
                    if (p.owner !== -1) {
                        scores[p.owner] += p.count;
                        p.count = 0;
                    }
                });
                const winner = scores.indexOf(Math.max(...scores));
                const msg = `Trò chơi kết thúc!\nNgười chơi 1: ${scores[0]}\nNgười chơi 2: ${scores[1]}\nNgười chơi 3: ${scores[2]}\n\nCHÚC MỪNG NGƯỜI CHƠI ${winner + 1}!`;
                
                // Thay thế alert bằng UI thông báo đẹp hơn hoặc tạm thời dùng console/custom logic
                const overEl = document.createElement('div');
                overEl.className = "fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-[2000] p-10 text-center";
                overEl.innerHTML = `<h1 class="text-4xl font-black mb-4">KẾT THÚC</h1><p class="text-xl mb-8">${msg.replace(/\n/g, '<br>')}</p><button onclick="location.reload()" class="bg-blue-600 px-10 py-4 rounded-xl font-bold">CHƠI LẠI</button>`;
                document.body.appendChild(overEl);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
