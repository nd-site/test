<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyFlow - Luyện gõ phím 10 ngón với AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            overflow-x: hidden;
        }

        .typing-area {
            font-family: 'JetBrains+Mono', monospace;
            font-size: 1.5rem;
            line-height: 2.8rem;
            letter-spacing: 0.05em;
            display: flex;
            flex-wrap: wrap;
            gap: 0 1px;
        }

        .char { 
            border-bottom: 3px solid transparent; 
            transition: all 0.1s;
            white-space: pre;
        }
        
        .char.current { border-bottom-color: #3b82f6; background-color: #dbeafe; color: #1e40af; }
        .char.correct { color: #10b981; }
        .char.incorrect { color: #ef4444; background-color: #fee2e2; }

        .key {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            height: 3.5rem;
            font-weight: bold;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
            transition: transform 0.05s, box-shadow 0.05s;
            user-select: none;
            font-size: 0.875rem;
        }

        .key.active {
            transform: translateY(2px);
            box-shadow: none;
            filter: brightness(0.9);
            border: 2px solid #3b82f6;
        }

        .hand-svg { width: 140px; height: 140px; }
        
        /* Custom Dropdown */
        .custom-select { position: relative; width: 220px; }
        .select-trigger {
            background: white; border: 1px solid #e2e8f0; padding: 0.5rem 1rem;
            border-radius: 0.75rem; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; font-weight: 500;
        }
        .select-options {
            position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 50; display: none;
        }
        .select-options.show { display: block; }
        .option { padding: 0.75rem 1rem; cursor: pointer; }
        .option:hover { background: #eff6ff; color: #3b82f6; }
        .option.selected { background: #3b82f6; color: white; }

        /* Status Toast */
        #apiStatus {
            position: fixed; bottom: 20px; right: 20px;
            padding: 12px 20px; border-radius: 10px;
            display: none; z-index: 100; font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 
        HƯỚNG DẪN CẤU HÌNH MÔI TRƯỜNG:
        Trên GitHub Pages hoặc môi trường Production, bạn hãy inject script này vào trước thẻ đóng </body>:
        <script>
            window.env = {
                GEMINI_API_KEY: "KEY_CUA_BAN_TAI_DAY"
            };
        </script>
    -->

    <div id="apiStatus"></div>

    <div class="max-w-5xl mx-auto space-y-6">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="mb-4 md:mb-0">
                <h1 class="text-3xl font-bold text-gray-800 tracking-tight">KeyFlow</h1>
                <p class="text-gray-500 italic">Powered by AI Generation</p>
            </div>
            <div class="flex flex-wrap gap-4 items-center">
                <div class="custom-select" id="customSelect">
                    <div class="select-trigger" id="selectTrigger">
                        <span id="selectedValue">Cuộc sống hàng ngày</span>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                    <div class="select-options" id="selectOptions">
                        <div class="option selected" data-value="Daily Life and Routines">Cuộc sống hàng ngày</div>
                        <div class="option" data-value="Technology and Innovation">Công nghệ & Đổi mới</div>
                        <div class="option" data-value="Business English">Tiếng Anh công sở</div>
                        <div class="option" data-value="Science Facts">Khoa học vui</div>
                    </div>
                </div>

                <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-all shadow-md active:scale-95">
                    Lấy nội dung AI
                </button>
            </div>
        </div>

        <!-- Typing Area -->
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 min-h-[180px] relative">
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-2"></div>
                <p class="text-blue-600 font-medium">AI đang soạn bài tập...</p>
            </div>
            <div id="typingArea" class="typing-area text-gray-300 select-none outline-none" tabindex="0">
                Đang chờ nội dung...
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="grid grid-cols-3 gap-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="text-center">
                <p class="text-xs text-gray-400 uppercase font-bold">Tốc độ (WPM)</p>
                <p class="text-3xl font-black text-blue-600" id="wpmDisplay">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs text-gray-400 uppercase font-bold">Chính xác</p>
                <p class="text-3xl font-black text-green-600" id="accDisplay">0%</p>
            </div>
            <div class="text-center">
                <p class="text-xs text-gray-400 uppercase font-bold">Phím tiếp theo</p>
                <p class="text-3xl font-black text-gray-700" id="targetChar">-</p>
            </div>
        </div>
    </div>

    <script>
        /**
         * Lấy API Key từ biến môi trường toàn cục
         */
        const getEnvConfig = () => {
            // Ưu tiên lấy từ window.env (cấu hình môi trường)
            if (window.env && window.env.GEMINI_API_KEY) {
                return window.env.GEMINI_API_KEY;
            }
            
            // Fallback: Lấy từ URL để debug nhanh
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('api_key') || "";
        };

        const API_KEY = getEnvConfig();
        const typingArea = document.getElementById('typingArea');
        const generateBtn = document.getElementById('generateBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusEl = document.getElementById('apiStatus');

        let currentTopic = "Daily Life and Routines";
        let text = "";
        let currentIndex = 0;
        let startTime = null;
        let errors = 0;
        let typedCount = 0;

        const showStatus = (msg, isError = true) => {
            statusEl.innerText = msg;
            statusEl.style.display = 'block';
            statusEl.style.backgroundColor = isError ? '#fee2e2' : '#dcfce7';
            statusEl.style.color = isError ? '#991b1b' : '#166534';
            setTimeout(() => statusEl.style.display = 'none', 4000);
        };

        // Select UI Logic
        document.getElementById('selectTrigger').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('selectOptions').classList.toggle('show');
        };

        document.querySelectorAll('.option').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                currentTopic = opt.dataset.value;
                document.getElementById('selectedValue').innerText = opt.innerText;
                document.getElementById('selectOptions').classList.remove('show');
            };
        });

        async function fetchAIContent() {
            if (!API_KEY) {
                showStatus("Lỗi: Không tìm thấy GEMINI_API_KEY trong môi trường!");
                return;
            }

            loadingOverlay.classList.remove('hidden');
            const prompt = `Write a clean 35-word paragraph for typing practice about ${currentTopic}. No special markdown.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error("Network response was not ok");

                const data = await response.json();
                const content = data.candidates[0].content.parts[0].text.trim().replace(/\s+/g, ' ');
                initTyping(content);
            } catch (err) {
                showStatus("Kết nối thất bại. Vui lòng kiểm tra API Key.");
                initTyping("Could not load AI content. Please verify your environment variables and internet connection.");
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }

        function initTyping(newText) {
            text = newText;
            currentIndex = 0;
            errors = 0;
            typedCount = 0;
            startTime = null;
            
            typingArea.innerHTML = text.split('').map((char, i) => 
                `<span class="char ${i === 0 ? 'current' : ''}">${char}</span>`
            ).join('');
            
            document.getElementById('wpmDisplay').innerText = "0";
            document.getElementById('accDisplay').innerText = "0%";
            document.getElementById('targetChar').innerText = text[0] === ' ' ? 'SPACE' : text[0];
            typingArea.focus();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.code === 'Space') e.preventDefault();
            if (currentIndex >= text.length || (e.key.length > 1 && e.key !== 'Backspace')) return;

            if (!startTime) startTime = new Date();
            const chars = typingArea.querySelectorAll('.char');

            if (e.key === 'Backspace') {
                if (currentIndex > 0) {
                    chars[currentIndex].classList.remove('current', 'correct', 'incorrect');
                    currentIndex--;
                    chars[currentIndex].classList.remove('correct', 'incorrect');
                    chars[currentIndex].classList.add('current');
                }
                return;
            }

            typedCount++;
            if (e.key === text[currentIndex]) {
                chars[currentIndex].classList.add('correct');
            } else {
                chars[currentIndex].classList.add('incorrect');
                errors++;
            }

            chars[currentIndex].classList.remove('current');
            currentIndex++;
            
            if (chars[currentIndex]) {
                chars[currentIndex].classList.add('current');
                document.getElementById('targetChar').innerText = text[currentIndex] === ' ' ? 'SPACE' : text[currentIndex];
            } else {
                document.getElementById('targetChar').innerText = "XONG!";
            }

            const timeMins = (new Date() - startTime) / 60000;
            document.getElementById('wpmDisplay').innerText = Math.round((typedCount / 5) / timeMins) || 0;
            document.getElementById('accDisplay').innerText = Math.round(((typedCount - errors) / typedCount) * 100) + "%";
        });

        generateBtn.onclick = fetchAIContent;
        window.onclick = () => document.getElementById('selectOptions').classList.remove('show');
        
        window.onload = () => {
            if (!API_KEY) {
                showStatus("Cảnh báo: Ứng dụng đang chạy không có API Key môi trường.");
            }
            initTyping("Nhấn nút 'Lấy nội dung AI' để bắt đầu luyện tập với các đoạn văn bản ngẫu nhiên.");
        };
    </script>
</body>
</html>
